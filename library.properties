paragraph=HMAC-SHA-256 short-code activation bound to efuse MAC + chip ID. Pure C, no external deps. Validates a 15-character "XXXXX-XXXXX-XXXXX" license against the local device fingerprint. Same library runs on Pi (Linux) for cross-product activation.
